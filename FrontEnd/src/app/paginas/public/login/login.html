<div class="container w-75">
  <div class="card-login w-50">
    <h2 class="text-center mb-4">Iniciar sesión</h2>

    <form class="form" (submit)="$event.preventDefault(); login()">

      <div>
        <label class="form-label">Email</label>
        <input type="email" name="emal" [value]="email" (input)="email = $event.target.value" />
      </div>

      <div>
        <label class="form-label">Password</label>
        <input type="password" name="password" [value]="password" (input)=" password = $event.target.value" />
      </div>

      @if (error) {
      <div class="text-danger mb-2 py-1 bg-danger-subtle text-center">{{ error }}</div>
      }

      <div class="d-flex justify-content-center align-items-center mb-4">
        <button class="btn btn-success w-50 mt-3 custom-rounded" [disabled]="loading" type="submit">
          @if (!loading) {
          <span>Aceptar</span>
          } @else {
          <span>Cargando...</span>
          }
        </button>
      </div>

      <a routerLink="/recuperar-password" class="link-forgot mt-2 text-center">¿Has olvidado la contraseña?</a>
    </form>

  </div>
</div>
