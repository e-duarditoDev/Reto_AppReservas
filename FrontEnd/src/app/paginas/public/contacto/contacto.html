<body class="background-home m-0">

    <app-header variante="contacto"></app-header>

    <div class="w-50 container-contacto mb-5">

        <!--  BOTÓN VOLVER -->
        <button class="btn-back mb-0" (click)="volver()">
            <img src="/iconos/back-button.svg" alt="Volver" class="icon-back"> Volver
        </button>

        <!-- TÍTULO -->
        <h1 class="text-start">Contacto</h1>

        <h5 class="descripcion text-start mt-4">
            Gracias por tu tiempo, cuéntanos tu idea y nos pondremos en contacto contigo.
        </h5>

        <!--  CARD -->
        <div class="d-flex flex-column align-items-center justify-content-center w-100 mt-4 card-contacto">

            <form (ngSubmit)="enviar()" class=" w-100">

                <!-- INPUTS -->
                <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Indica tu nombre" required />

                <input type="text" [(ngModel)]="apellido" name="apellido" placeholder="Indica tu primer apellido"
                    required />

                <!-- FILA -->
                <div class="d-flex flex-row gap-3">
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Correo" required>
                    <input type="text" [(ngModel)]="telefono" name="telefono" placeholder="Teléfono (opcional)">
                </div>

                <textarea [(ngModel)]="mensaje" name="mensaje" placeholder="Describe tu idea..." required></textarea>

                    <button routerLink="/" aria-label="Enviar" class="btn-enviar w-50 mt-3 custom-rounded">
                        Enviar
                    </button>

            </form>
        </div>

        <!--  OTRAS VÍAS -->
        <div class="otras-vias">
            <h3>Otras vías de contacto</h3>

            <div class="contact-icons">
                <nav class="d-flex flex-row align-items-center">
                    <img src="/iconos/whatsapp.webp" alt="Whatsapp">
                    <a class="nav-link-soft text-decoration-none text-muted fw-medium position-relative"
                        href="https://wa.me/34690329135?text=Hola%20Eduardo,%20he%20visitado%20tu%20web%20y%20me%20gustaría%20hablarte%20sobre%20un%20proyecto."
                        target="_blank" rel="noopener"> Whatsapp</a>
                </nav>


                <nav class="d-flex flex-row align-items-center">
                    <img src="/iconos/mail_icon.webp" alt="Email">
                    <a class="nav-link-soft text-decoration-none text-muted fw-medium position-relative"
                        href="mailto:[EMAIL_ADDRESS]?subject=Contacto%20desde%20tu%20web&body=Hola%20Eduardo:%0D%0AHe%20visitado%20tu%20web%20y%20me%20gustaría%20hablarte%20sobre%20un%20proyecto.%0A%0AUn%20saludo."
                        target="_blank" rel="noopener"> Email</a>
                </nav>

            </div>
        </div>
    </div>

    <app-footer variante="contacto"></app-footer>

</body>
